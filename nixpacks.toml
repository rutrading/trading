# Pin nixpkgs to a commit that ships bun 1.3.11 (matches our local toolchain
# and fixes React Compiler module resolution).
[phases.setup]
nixPkgs = ['bun']
nixpkgsArchive = '7149c06513f335be57f26fcbbbe34afda923882b'

[phases.install]
dependsOn = ['setup']
cmds = ['bun install']
cacheDirectories = ['/root/.bun/install/cache']

[phases.build]
dependsOn = ['install']
cmds = ['bun run --cwd web build']

[start]
cmd = 'bun run --cwd web start'
